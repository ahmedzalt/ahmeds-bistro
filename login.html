<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Restaurant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="#" class="logo">Ahmed's Bistro</a>
            <div class="nav-buttons">
                <button id="theme-toggle">🌙 Dark</button>
            </div>
        </nav>
    </header>

    <main>
        <div class="form-container reveal active">
            <h2 class="text-center">Staff / User Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter any username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter any password">
                </div>
                <p id="login-error" class="error-msg"></p>
                <button type="submit" style="width: 100%;">Login</button>
            </form>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>

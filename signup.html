<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Ahmed's Bistro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Ahmed's Bistro</a>
            <div class="nav-buttons">
                <button id="theme-toggle">🌙 Dark</button>
            </div>
        </nav>
    </header>

    <main>
        <div class="form-container reveal active">
            <h2 class="text-center">Create Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="new-username">Username</label>
                    <input type="text" id="new-username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="new-email">Email Address</label>
                    <input type="email" id="new-email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="new-password">Password</label>
                    <input type="password" id="new-password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat password" required>
                </div>
                <p id="signup-error" class="error-msg"></p>
                <p id="signup-success" class="success-msg"></p>
                <button type="submit" style="width: 100%;">Create Account</button>
            </form>
            <p style="margin-top: 1rem; text-align: center; font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary-color);">Login here</a>
            </p>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
